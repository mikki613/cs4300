{% extends "bookings/base.html" %}

{% block title %}Book Seat{% endblock %}

{% block content %}
<!-- TEMPLATE VERSION: NEW AVAILABLE SEATS TEMPLATE -->

<div class="container mt-4">
  <h2 class="mb-4">Book a Seat for: {{ movie.title }}</h2>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  {% if seats %}
    <div class="card p-4">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label for="seat_id" class="form-label">Choose a seat:</label>
          <select class="form-select" name="seat_id" id="seat_id" required>
            <option value="" selected>Select a seat</option>
            {% for seat in seats %}
              <option value="{{ seat.id }}">{{ seat.seat_number }}</option>
            {% endfor %}
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Confirm Booking</button>
        <a href="{% url 'movie_list' %}" class="btn btn-secondary ms-2">Back</a>
      </form>
    </div>
  {% else %}
    <div class="alert alert-warning">No available seats left for this movie.</div>
    <a href="{% url 'movie_list' %}" class="btn btn-secondary">Back</a>
  {% endif %}
</div>
{% endblock %}
